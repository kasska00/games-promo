<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoVerse | Актуальные Промокоды и Бонусы</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: #fff; }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .tab-btn.active, .tab-btn:hover {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            gap: 15px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-info h3 {
            margin: 0 0 8px 0;
            color: #fff;
            font-size: 20px;
        }
        .card-info p {
            margin: 0;
            font-size: 14px;
            color: #8b949e;
        }
        .copy-btn {
            background-color: var(--btn-bg);
            color: var(--accent-color);
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        .copy-btn:hover {
            background-color: var(--btn-hover);
        }
        .loading {
            text-align: center;
            font-style: italic;
            color: #8b949e;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Свежие Промокоды</h1>
    <p>Все коды обновляются автоматически в реальном времени</p>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('genshin')">Genshin Impact</button>
    <button class="tab-btn" onclick="switchTab('hkrpg')">Honkai: Star Rail</button>
    <button class="tab-btn" onclick="switchTab('roblox')">Roblox / Blade Ball</button>
    <button class="tab-btn" onclick="switchTab('cases')">CS2 Кейсы</button>
</div>

<div class="container" id="codes-container">
    <div class="loading">Загрузка актуальных промокодов...</div>
</div>

<script>
    // Вечные партнерские коды (Замени на свои рефералки)
    .const staticCodes = {
        roblox: [
            { code: "KASSKA2026", reward: "Эксклюзивный меч + 500 монет в Blade Ball", link: "https://www.roblox.com" },
            { code: "BLADEBALL100", reward: "Бесплатный скин на оружие", link: "https://www.roblox.com" }
        ],
        cases: [
            { code: "KASSKACSFAIL", reward: "+15% к пополнению баланса на CSFAIL", link: "#" },
            { code: "GGDROPBONUS", reward: "Бесплатный кейс при регистрации на GGDROP", link: "#" }
        ]
    };

    let currentTab = 'genshin';

    // Функция загрузки кодов из глобального Hoyo-API
    async function loadHoyoCodes(gameName) {
        const container = document.getElementById('codes-container');
        container.innerHTML = '<div class="loading">Получение данных с сервера...</div>';
        
        try {
            // Используем стабильное открытое API для кодов Hoyoverse
            const response = await fetch(`https://hoyo-codes.seria.moe/codes?game=${gameName}`);
            const data = await response.json();
            
            container.innerHTML = '';
            
            // Фильтруем только рабочие коды
            const activeCodes = data.codes.filter(c => c.status === 'OK');

            if (activeCodes.length === 0) {
                container.innerHTML = '<div class="loading">Нет активных кодов на сегодня.</div>';
                return;
            }

            activeCodes.forEach(item => {
                createCard(item.code, item.reward_ru || item.reward_en || "Награды внутри игры");
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="loading">Ошибка авто-обновления. Попробуйте позже.</div>';
        }
    }

    // Рендер статичных (твоих личных) кодов
    function loadStaticCodes(gameKey) {
        const container = document.getElementById('codes-container');
        container.innerHTML = '';
        
        const codes = staticCodes[gameKey];
        codes.forEach(item => {
            createCard(item.code, item.reward, item.link);
        });
    }

    // Создание карточки на странице
    function createCard(code, reward, link = null) {
        const container = document.getElementById('codes-container');
        const card = document.createElement('div');
        card.className = 'card';
        
        card.innerHTML = `
            <div class="card-info">
                <h3>${code}</h3>
                <p>${reward}</p>
            </div>
            <button class="copy-btn" onclick="copyCode('${code}', this)">Копировать</button>
        `;
        
        // Если привязана ссылка, делаем кликабельным заголовок
        if(link) {
            card.querySelector('h3').style.cursor = 'pointer';
            card.querySelector('h3').onclick = () => window.open(link, '_blank');
        }

        container.appendChild(card);
    }

    // Логика переключения вкладок
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if (tab === 'genshin' || tab === 'hkrpg') {
            loadHoyoCodes(tab);
        } else {
            loadStaticCodes(tab);
        }
    }

    // Функция копирования в буфер
    function copyCode(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = 'Скопировано!';
            btn.style.color = '#3fb950';
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.color = 'var(--accent-color)';
            }, 1500);
        });
    }

    // Первая загрузка
    loadHoyoCodes('genshin');
</script>

</body>
</html>
